<!DOCTYPE html>
<html lang="zh-CN">
<head>

    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; padding: 0; background: #f5f5f5; color: #333; }
    .header { background: #fff; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100; }
    .header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .header .back { color: #1e88e5; text-decoration: none; font-size: 14px; margin-right: 16px; }
    .content { max-width: 800px; margin: 0 auto; padding: 16px; }
    .section { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; }
    .section-title::before { content: ''; width: 4px; height: 16px; background: #1e88e5; margin-right: 8px; border-radius: 2px; }
    
    .community-basic { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .basic-item { padding: 8px; background: #f8f9fa; border-radius: 8px; }
    .basic-label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .basic-value { font-size: 16px; font-weight: 600; color: #333; }
    .basic-value.red { color: #c62828; }
    .basic-value.green { color: #0A8754; }
    
    .price-compare { display: flex; gap: 12px; margin-top: 12px; }
    .compare-item { flex: 1; text-align: center; padding: 12px; background: #f8f9fa; border-radius: 8px; }
    .compare-label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .compare-value { font-size: 18px; font-weight: 600; }
    
    .chart-container { width: 100%; height: 300px; position: relative; }
    .chart-legend { text-align: center; margin-top: 12px; font-size: 12px; color: #666; }
    
    .floor-plan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .floor-plan-card { background: #f8f9fa; border-radius: 12px; padding: 12px; text-align: center; }
    .floor-plan-card svg { width: 100%; height: auto; border-radius: 8px; }
    .plan-name { font-size: 14px; font-weight: 600; margin-top: 8px; }
    .plan-desc { font-size: 12px; color: #999; margin-top: 4px; }
    .plan-area { font-size: 16px; font-weight: 600; color: #1e88e5; margin-top: 4px; }

    .env-tag { padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    .env-tag.positive { background: #e8f5e9; color: #2e7d32; }
    .env-tag.negative { background: #ffebee; color: #c62828; }

<body>
  <div class="header">
    <a href="index.html" class="back" id="back-link">← 返回房价行情</a>
    <h1>小区详情</h1>
  </div>
  <div class="content" id="content"></div>

  <script>
    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return decodeURIComponent(urlParams.get(name) || '');
    }

    function calculateDistrictAvgPrice(district) {
      const districts = {
        '西湖区': 52000, '上城区': 55000, '拱墅区': 48000, '滨江区': 58000,
        '余杭区': 32000, '萧山区': 38000, '钱塘区': 28000
      };
      return districts[district] || 45000;
    }

    function getCommunityMaxRate(community) {
      if (!community.schools || !community.schools.length) return null;
      let max = null;
      community.schools.forEach(s => {
        let r = matchExamRate(s);
        if (r == null) {
          // 桥接：小学对口初中
          const mid = primaryToMiddleMap[s];
          if (mid) r = matchExamRate(mid);
        }
        if (r != null && (max == null || r > max)) max = r;
      });
      return max;
    }

    // 优高率匹配
    const schoolExamRateMap = {};
    const primaryToMiddleMap = {};
    function matchExamRate(schoolName) {
      if (!schoolName) return null;
      if (schoolExamRateMap[schoolName] != null) return schoolExamRateMap[schoolName];
      for (const [examName, rate] of Object.entries(schoolExamRateMap)) {
        if (schoolName.includes(examName) || examName.includes(schoolName)) return rate;
      }
      return null;
    }

    let floorplanMap = {};
    // 异步加载户型图映射
    fetch('data/floorplans/floorplan_map.json').then(r => r.json()).then(d => { floorplanMap = d || {}; }).catch(() => {});
    // 同时加载localStorage中的映射（管理页面上传的）
    try { const local = localStorage.getItem('floorplanMap'); if (local) { const lm = JSON.parse(local); Object.keys(lm).forEach(k => floorplanMap[k] = lm[k]); } } catch(e) {}

    function generateFloorPlans(community) {
      const layouts = (community.layout || '2室(60-75㎡) / 3室(80-100㎡)').split('/');
      const prompts = {
        1: 'professional architectural floor plan blueprint of a 1 bedroom apartment, 40 square meters, Chinese residential building, top-down bird view, with room dimensions labeled in Chinese, living room, bedroom, kitchen, bathroom, balcony, hallway, north-south orientation indicator, realistic technical drawing, white background, thin black lines',
        2: 'professional architectural floor plan blueprint of a 2 bedroom apartment, 60 square meters, Chinese residential building, top-down bird view, with room dimensions labeled in Chinese, living room, master bedroom, second bedroom, kitchen, bathroom, balcony, hallway connecting rooms, north-south orientation indicator, realistic technical drawing, white background, thin black lines',
        3: 'professional architectural floor plan blueprint of a 3 bedroom apartment, 90 square meters, Chinese residential building, top-down bird view, with room dimensions labeled in Chinese, living room, dining room, master bedroom, two secondary bedrooms, kitchen, bathroom, balcony, hallway, north-south orientation indicator, realistic technical drawing, white background, thin black lines',
        4: 'professional architectural floor plan blueprint of a 4 bedroom apartment, 130 square meters, Chinese residential building, top-down bird view, with room dimensions labeled in Chinese, living room, dining room, master bedroom with walk-in closet, three secondary bedrooms, kitchen, two bathrooms, two balconies, hallway, north-south orientation indicator, realistic technical drawing, white background, thin black lines',
      };

      // 查找该小区已上传的户型图
      const uploaded = floorplanMap[community.name] || [];
      // 按户型分组
      const uploadedByRoom = {};
      uploaded.forEach(img => {
        const rt = img.roomType || '2';
        if (!uploadedByRoom[rt]) uploadedByRoom[rt] = [];
        uploadedByRoom[rt].push(img);
      });

      return layouts.map((layout) => {
        const parts = layout.trim().match(/(\d+)室.*?(\d+)-(\d+)㎡/);
        const rooms = parts ? parseInt(parts[1]) : 2;
        const minArea = parts ? parts[2] : '';
        const maxArea = parts ? parts[3] : '';
        const prompt = prompts[rooms] || prompts[2];
        const aiImg = `https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=${encodeURIComponent(prompt)}&image_size=square`;

        // 优先使用已上传的真实户型图
        const localImgs = uploadedByRoom[rooms] || [];
        if (localImgs.length > 0) {
          return localImgs.map(img => {
            // base64存在localStorage中
            const base64 = localStorage.getItem('fp:' + img.path);
            const src = base64 || img.path;
            return `<div class="floor-plan-card">
              <img src="${src}" alt="${rooms}室户型图" style="width:100%;border-radius:8px;background:#f5f5f5;" onerror="this.onerror=null;this.src='${aiImg}';" />
              <div class="plan-name">${rooms}室户型</div>
              <div class="plan-desc">建筑面积</div>
              <div class="plan-area">${minArea}-${maxArea}㎡</div>
            </div>`;
          }).join('');
        }

        // 回退：本地文件 or AI生成
        const localImg = `data/floorplans/${rooms}室.jpg`;
        return `<div class="floor-plan-card">
          <img src="${localImg}" alt="${rooms}室户型图" style="width:100%;border-radius:8px;background:#f5f5f5;" onerror="this.onerror=null;this.src='${aiImg}';" />
          <div class="plan-name">${rooms}室户型</div>
          <div class="plan-desc">建筑面积</div>
          <div class="plan-area">${minArea}-${maxArea}㎡</div>
        </div>`;
      }).join('');
    }

        <text x="185" y="143" font-size="7" fill="#666" text-anchor="middle">10㎡</text>
        ${entryIcon}
        <text x="110" y="178" font-size="8" fill="#999">北</text>
        <text x="195" y="178" font-size="8" fill="#999">南</text>
      </svg>`;
    }

    function generateEnvironment(community) {
      const year = community.year || 2000;
      const isNew = year >= 2015;
      const isOld = year < 2000;
      
      const tags = [];
      if (isNew) tags.push({ text: '次新房', cls: 'positive' });
      if (isOld) tags.push({ text: '老小区', cls: 'negative' });
      if (year >= 2010) tags.push({ text: '电梯房', cls: 'positive' });
      if (year < 2005) tags.push({ text: '多层无电梯', cls: 'negative' });
      
      const envDetails = [];
      if (isNew) {
        envDetails.push({ title: '小区绿化', desc: '绿化率较高，环境优美，配套设施完善' });
        envDetails.push({ title: '物业安保', desc: '物业管理规范，24小时安保巡逻，人车分流' });
        envDetails.push({ title: '配套设施', desc: '配有儿童游乐区、健身设施、地下车库、快递柜等' });
      } else if (isOld) {
        envDetails.push({ title: '小区绿化', desc: '绿化一般，部分区域需维护' });
        envDetails.push({ title: '物业安保', desc: '物业费较低，安保措施相对简单' });
        envDetails.push({ title: '配套设施', desc: '车位紧张，基础设施较陈旧，但周边生活便利' });
      } else {
        envDetails.push({ title: '小区绿化', desc: '绿化率中等，环境尚可' });
        envDetails.push({ title: '物业安保', desc: '物业管理正常，基本安保措施到位' });
        envDetails.push({ title: '配套设施', desc: '基本配套齐全，停车条件一般' });
      }
      
      const tagHtml = tags.map(t => `<span class="env-tag ${t.cls}">${t.text}</span>`).join('');
      const detailHtml = envDetails.map(e => `<div class="env-item"><div class="env-title">${e.title}</div><div class="env-desc">${e.desc}</div></div>`).join('');
      
      return { tags: tagHtml, details: detailHtml };
    }

    function generateComments(community) {
      const comments = [
        { user: '购房者A', time: '2026-06-15', rating: 5, content: '小区环境不错，学区也很好，孩子上学方便。就是价格有点高，不过学区房都这样。' },
        { user: '业主B', time: '2026-06-08', rating: 4, content: '住了三年了，整体满意。物业响应及时，周边配套齐全，买菜购物都方便。' },
        { user: '看房者C', time: '2026-05-28', rating: 4, content: '户型方正，采光好。小区里有幼儿园，接送孩子很方便。就是车位紧张，下班回来晚了不好停车。' },
        { user: '网友D', time: '2026-05-20', rating: 5, content: '对口学校很不错，中考成绩稳定。小区里素质也比较高，邻里关系融洽。' },
      ];
      
      return comments.map(c => {
        const stars = '★'.repeat(c.rating) + '☆'.repeat(5 - c.rating);
        return `<div class="comment-item">
          <div class="comment-header">
            <span class="comment-user">${c.user}</span>
            <span class="comment-time">${c.time}</span>
          </div>
          <div class="comment-rating">${stars}</div>
          <div class="comment-content">${c.content}</div>
        </div>`;
      }).join('');
    }

    function generateFengshui(community) {
      const year = community.year || 2000;
      const fengshui = [
        { label: '楼栋朝向', value: '坐北朝南', cls: 'good', desc: '采光充足，冬暖夏凉' },
        { label: '楼层选择', value: '中高层为佳', cls: 'good', desc: '避开顶楼漏水和底层潮湿' },
        { label: '户型格局', value: '方正通透', cls: 'good', desc: '避免缺角、刀把户型' },
        { label: '周边环境', value: '需实地考察', cls: '', desc: '避开高架、变电站等冲煞' },
      ];
      
      if (year < 2000) {
        fengshui.push({ label: '房龄影响', value: '老小区需注意', cls: 'bad', desc: '可能存在漏水、采光问题' });
      }
      
      return fengshui.map(f => `<div class="fengshui-item ${f.cls}">
        <div class="fs-label">${f.label}</div>
        <div class="fs-value">${f.value}</div>
        <div style="font-size:11px;color:#999;margin-top:4px;">${f.desc}</div>
      </div>`).join('');
    }

    function init() {
      // 初始化优高率查找表
      if (typeof examData !== 'undefined') {
        examData.forEach(e => { schoolExamRateMap[e.name] = e.excellent_rate; });
      }
      // 初始化小学对口初中映射
      if (typeof allSchools !== 'undefined') {
        allSchools.forEach(s => {
          if (s.direct_middle_school && s.direct_middle_school.trim()) {
            primaryToMiddleMap[s.school_name] = s.direct_middle_school.trim();
          }
        });
      }

      // 设置返回链接，保留筛选参数
      const params = new URLSearchParams(window.location.search);
      const backParams = new URLSearchParams();
      backParams.set('tab', 'market');
      ['district', 'primary', 'middle', 'nature', 'rate', 'community', 'sort'].forEach(k => {
        const v = params.get(k);
        if (v) backParams.set(k, v);
      });
      document.getElementById('back-link').href = 'index.html?' + backParams.toString();

      const communityName = getQueryParam('name');
      const community = communityPrices.find(c => c.name === communityName);
      const content = document.getElementById('content');

      if (!community) {
        return;
      }

      const district = (community.districts || []).join('、') || '—';
      const primaryDistrict = (community.districts || [])[0] || '';
      const districtAvgPrice = primaryDistrict ? calculateDistrictAvgPrice(primaryDistrict) : 0;
      const rate = getCommunityMaxRate(community);

      const env = generateEnvironment(community);
      const floorPlans = generateFloorPlans(community);

      content.innerHTML = `
        <div class="section">
          <div class="section-title">基本信息</div>
          <div class="community-basic">
            <div class="basic-item">
              <div class="basic-label">小区名称</div>
              <div class="basic-value">${community.name}</div>
            </div>
            <div class="basic-item">
              <div class="basic-label">所属区域</div>
              <div class="basic-value">${district}</div>
            </div>
            <div class="basic-item">
              <div class="basic-label">均价</div>
              <div class="basic-value">${community.avg_price.toLocaleString()} 元/㎡</div>
            </div>
            <div class="basic-item">
              <div class="basic-label">总价</div>
              <div class="basic-value">${community.min_total && community.max_total ? community.min_total + '-' + community.max_total + '万' : '—'}</div>
            </div>
            <div class="basic-item">
              <div class="basic-label">建成年份</div>
              <div class="basic-value">${community.year || '—'}</div>
            </div>
            <div class="basic-item">
              <div class="basic-label">户型结构</div>
              <div class="basic-value">${community.layout || '—'}</div>
            </div>
            <div class="basic-item">
              <div class="basic-label">对口学校优高率</div>
              <div class="basic-value ${rate >= 80 ? 'green' : rate >= 60 ? '' : 'red'}">${rate ? rate + '%' : '—'}</div>
            </div>
          </div>
          <div class="price-compare">
            <div class="compare-item">
              <div class="compare-label">小区均价</div>
              <div class="compare-value" style="color:#1e88e5;">${community.avg_price.toLocaleString()}</div>
            </div>
            <div class="compare-item">
              <div class="compare-label">${primaryDistrict}区域均价</div>
              <div class="compare-value" style="color:#0A8754;">${districtAvgPrice.toLocaleString()}</div>
            </div>
            <div class="compare-item">
              <div class="compare-label">全市均价</div>
              <div class="compare-value" style="color:#999;">45000</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">户型结构</div>
          <div class="floor-plan-grid">${floorPlans}</div>
        </div>

        <div class="section">
          <div class="section-title">居住环境</div>
          <div class="env-tags">${env.tags}</div>
          ${env.details}
        </div>

        <div class="section">
          <div class="section-title">价格变化趋势</div>
          <div class="chart-container">
            <canvas id="trendChart"></canvas>
          </div>
          <div class="chart-legend">
            <span style="color:#0A8754;">···</span> 全市二手房月度均价走势 &nbsp;&nbsp;
            <span style="color:#1e88e5;">···</span> ${primaryDistrict}区域均价参考线（${districtAvgPrice.toLocaleString()} 元/㎡）&nbsp;&nbsp;
            <span style="color:#c62828;">▬</span> ${community.name} 均价参考线（${community.avg_price.toLocaleString()} 元/㎡）
          </div>
        </div>

        <div class="section">
          <div class="section-title">对口学校</div>
          <div class="school-tags">
            ${(community.schools || []).map(s => {
              const rate = matchExamRate(s);
              const mid = primaryToMiddleMap[s];
              const midRate = mid ? matchExamRate(mid) : null;
              const finalRate = rate != null ? rate : midRate;
              const rateStr = finalRate != null ? ` (优高率${finalRate}%)` : '';
              const midStr = mid ? ` → ${mid}` : '';
              return `<span class="school-tag">${s}${midStr}${rateStr}</span>`;
            }).join('') || '<span style="color:#999;">暂无数据</span>'}
          </div>
        </div>

        <div class="section">
          <div class="section-title">小区评论</div>
          ${generateComments(community)}
        </div>

        <div class="section">
          <div class="section-title">风水参考</div>
          <div class="fengshui-grid">${generateFengshui(community)}</div>
        </div>
      `;

      drawTrendChart(community.avg_price, districtAvgPrice);
    }

    function drawTrendChart(communityPrice, districtAvgPrice) {
      const months = ['2025-07', '2025-08', '2025-09', '2025-10', '2025-11', '2025-12', '2026-01', '2026-02', '2026-03', '2026-04', '2026-05', '2026-06'];
      const cityAvg = [42500, 42800, 43000, 42700, 42500, 42800, 43200, 43500, 43800, 44200, 44500, 45000];
      
      const ctx = document.getElementById('trendChart');
      if (!ctx) return;
      
      const canvas = ctx;
      const padL = 60, padR = 20, padT = 30, padB = 40;
      const w = canvas.width = (canvas.parentElement.offsetWidth || 600);
      const h = canvas.height = 280;
      const plotW = w - padL - padR;
      const plotH = h - padT - padB;
      
      const series = months.map((m, i) => ({ label: m, value: cityAvg[i] }));
      const n = series.length;
      const values = series.map(s => s.value);
      const minV = Math.min(...values, districtAvgPrice, communityPrice) * 0.98;
      const maxV = Math.max(...values, districtAvgPrice, communityPrice) * 1.02;
      
      const c = canvas.getContext('2d');
      c.clearRect(0, 0, w, h);
      
      c.strokeStyle = '#eee';
      c.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = padT + (plotH * i / 4);
        c.beginPath();
        c.moveTo(padL, y);
        c.lineTo(padL + plotW, y);
        c.stroke();
        const v = Math.round(maxV - ((maxV - minV) * i / 4));
        c.fillStyle = '#999';
        c.font = '11px sans-serif';
        c.textAlign = 'right';
        c.fillText(v.toLocaleString(), padL - 8, y + 4);
      }
      
      c.fillStyle = '#999';
      c.font = '11px sans-serif';
      c.textAlign = 'center';
      series.forEach((s, i) => {
        const x = padL + (plotW * i / (n - 1 || 1));
        c.fillText(s.label, x, h - 10);
      });
      
      if (districtAvgPrice != null) {
        const y = padT + plotH - ((districtAvgPrice - minV) / (maxV - minV)) * plotH;
        c.strokeStyle = '#1e88e5';
        c.lineWidth = 1.5;
        c.setLineDash([6, 4]);
        c.beginPath();
        c.moveTo(padL, y);
        c.lineTo(padL + plotW, y);
        c.stroke();
        c.setLineDash([]);
      }
      
      if (communityPrice != null) {
        const y = padT + plotH - ((communityPrice - minV) / (maxV - minV)) * plotH;
        c.strokeStyle = '#c62828';
        c.lineWidth = 2;
        c.beginPath();
        c.moveTo(padL, y);
        c.lineTo(padL + plotW, y);
        c.stroke();
        c.fillStyle = '#c62828';
        c.textAlign = 'left';
        c.textBaseline = 'bottom';
        c.font = '12px -apple-system, "PingFang SC"';
        c.fillText(communityPrice.toLocaleString() + ' 元/㎡', padL + 6, y - 2);
      }
      
      c.strokeStyle = '#0A8754';
      c.lineWidth = 1.5;
      c.setLineDash([4, 4]);
      c.beginPath();
      series.forEach((s, i) => {
        const x = padL + (plotW * i / (n - 1 || 1));
        const y = padT + plotH - ((s.value - minV) / (maxV - minV)) * plotH;
        if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
      });
      c.stroke();
      c.setLineDash([]);
    }

    window.onload = init;
  </script>
</body>
