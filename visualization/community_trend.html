<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小区价格趋势 - 杭州买房指南</title>
  <script src="./data/school_data.js"></script>
  <script src="./data/price_data.js"></script>
  <script src="./data/community_prices.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; }
    .app-header {
      background: linear-gradient(135deg, #0A8754 0%, #066b43 100%);
      color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .app-header h1 { font-size: 20px; font-weight: 600; }
    .app-header .back { font-size: 14px; background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 16px; cursor: pointer; text-decoration: none; color: #fff; }
    .app-header .back:hover { background: rgba(255,255,255,0.3); }

    .tab-content { padding: 20px 32px; max-width: 1200px; margin: 0 auto; }

    .info-card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .info-card h2 { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #f0f0f0; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .info-item .label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .info-item .value { font-size: 16px; font-weight: 600; color: #333; }
    .info-item .value.red { color: #c62828; }
    .info-item .value.green { color: #0A8754; }
    .info-item .value.price { font-size: 22px; }

    .price-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .price-stat { background: #fff; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .price-stat .label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .price-stat .value { font-size: 22px; font-weight: 700; color: #333; }
    .price-stat .value.red { color: #c62828; }
    .price-stat .value.green { color: #0A8754; }

    .chart-section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .chart-section h3 { font-size: 17px; font-weight: 600; color: #333; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; display: flex; align-items: center; gap: 8px; }
    .chart-section h3 .icon { font-size: 20px; }
    #chart-wrap { position: relative; width: 100%; height: 420px; background: #fafafa; border-radius: 8px; padding: 12px; }
    #price-chart { width: 100%; height: 100%; }
    .chart-legend { margin-top: 10px; font-size: 13px; color: #666; }

    .schools-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .school-tag { font-size: 13px; padding: 4px 12px; border-radius: 6px; background: #f0f9eb; color: #0A8754; }
    .school-tag.has-rate { background: #fdf6ec; color: #d89614; font-weight: 600; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 8px; }
    .data-table th, .data-table td { padding: 8px 12px; border: 1px solid #e8e8e8; text-align: left; }
    .data-table th { background: #fafafa; font-weight: 600; color: #333; }

    .empty-state { text-align: center; padding: 80px 20px; color: #999; }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="app-header">
    <a class="back" href="index.html">← 返回</a>
    <h1>小区价格趋势</h1>
  </div>

  <div class="tab-content">
    <div id="content">
      <div class="empty-state"><div class="icon">🔍</div><div>未找到该小区信息</div></div>
    </div>
  </div>

<script>
// 全局数据
const allSchools = window.schools || [];
const priceData = window.priceData || [];
const priceStats = window.priceStats || {};
const communityPrices = window.communityPrices || [];

// 中考成绩数据（与 index.html 一致）
const examData = [
  { name: '杭州文澜中学', district: '拱墅区', type: '民办', excellent_rate: 95.3, key_rate: 78.5, max_score: 588, students: 312, year: 2024 },
  { name: '杭州建兰中学', district: '上城区', type: '民办', excellent_rate: 93.8, key_rate: 76.2, max_score: 585, students: 428, year: 2024 },
  { name: '杭州外国语学校', district: '西湖区', type: '民办', excellent_rate: 98.2, key_rate: 85.3, max_score: 592, students: 286, year: 2024 },
  { name: '杭州育才中学', district: '拱墅区', type: '民办', excellent_rate: 91.5, key_rate: 72.8, max_score: 583, students: 356, year: 2024 },
  { name: '杭州锦绣中学', district: '拱墅区', type: '民办', excellent_rate: 89.6, key_rate: 68.5, max_score: 580, students: 298, year: 2024 },
  { name: '杭州采荷实验学校', district: '上城区', type: '民办', excellent_rate: 90.2, key_rate: 70.3, max_score: 581, students: 312, year: 2024 },
  { name: '杭州市十三中教育集团', district: '西湖区', type: '公办', excellent_rate: 82.5, key_rate: 58.6, max_score: 575, students: 528, year: 2024 },
  { name: '杭州市十五中教育集团', district: '西湖区', type: '公办', excellent_rate: 78.3, key_rate: 52.1, max_score: 572, students: 486, year: 2024 },
  { name: '杭州市保俶塔实验学校', district: '西湖区', type: '公办', excellent_rate: 80.6, key_rate: 55.8, max_score: 574, students: 412, year: 2024 },
  { name: '杭州市公益中学', district: '西湖区', type: '公办', excellent_rate: 79.5, key_rate: 54.2, max_score: 573, students: 386, year: 2024 },
  { name: '杭州市翠苑中学', district: '西湖区', type: '公办', excellent_rate: 72.8, key_rate: 45.3, max_score: 568, students: 358, year: 2024 },
  { name: '杭州市文华中学', district: '西湖区', type: '公办', excellent_rate: 75.6, key_rate: 48.9, max_score: 570, students: 342, year: 2024 },
  { name: '杭州市钱学森学校', district: '上城区', type: '公办', excellent_rate: 81.2, key_rate: 56.8, max_score: 574, students: 218, year: 2024 },
  { name: '杭州中学', district: '上城区', type: '公办', excellent_rate: 83.5, key_rate: 59.2, max_score: 576, students: 465, year: 2024 },
  { name: '杭州市采荷中学', district: '上城区', type: '公办', excellent_rate: 76.8, key_rate: 50.5, max_score: 571, students: 432, year: 2024 },
  { name: '杭州市天杭实验学校', district: '上城区', type: '公办', excellent_rate: 74.2, key_rate: 47.6, max_score: 569, students: 386, year: 2024 },
  { name: '杭州市东城中学', district: '上城区', type: '公办', excellent_rate: 71.5, key_rate: 44.2, max_score: 567, students: 412, year: 2024 },
  { name: '杭州市安吉路实验学校', district: '拱墅区', type: '公办', excellent_rate: 77.6, key_rate: 51.8, max_score: 571, students: 358, year: 2024 },
  { name: '杭州市大关中学', district: '拱墅区', type: '公办', excellent_rate: 73.5, key_rate: 46.3, max_score: 568, students: 396, year: 2024 },
  { name: '杭州市文晖实验学校', district: '拱墅区', type: '公办', excellent_rate: 70.8, key_rate: 43.5, max_score: 566, students: 312, year: 2024 },
  { name: '杭州江南实验学校', district: '滨江区', type: '公办', excellent_rate: 84.6, key_rate: 61.2, max_score: 577, students: 512, year: 2024 },
  { name: '杭州二中白马湖学校', district: '滨江区', type: '公办', excellent_rate: 86.2, key_rate: 63.8, max_score: 579, students: 286, year: 2024 },
  { name: '浙江省杭州滨兴学校', district: '滨江区', type: '公办', excellent_rate: 75.3, key_rate: 49.6, max_score: 570, students: 268, year: 2024 },
  { name: '杭州闻涛中学', district: '滨江区', type: '公办', excellent_rate: 78.9, key_rate: 53.5, max_score: 572, students: 312, year: 2024 },
  { name: '杭州市钱江新城实验学校', district: '上城区', type: '公办', excellent_rate: 80.8, key_rate: 56.2, max_score: 574, students: 386, year: 2024 },
  { name: '杭州市开元中学', district: '上城区', type: '公办', excellent_rate: 68.5, key_rate: 40.8, max_score: 565, students: 328, year: 2024 },
  { name: '杭州市惠兴中学', district: '上城区', type: '公办', excellent_rate: 72.3, key_rate: 45.6, max_score: 568, students: 296, year: 2024 },
  { name: '杭州市青春中学', district: '拱墅区', type: '公办', excellent_rate: 69.2, key_rate: 41.5, max_score: 566, students: 312, year: 2024 },
  { name: '杭州市朝晖中学', district: '拱墅区', type: '公办', excellent_rate: 67.8, key_rate: 39.6, max_score: 564, students: 356, year: 2024 },
  { name: '杭州市杭师大东城实验学校', district: '上城区', type: '公办', excellent_rate: 70.5, key_rate: 43.2, max_score: 567, students: 342, year: 2024 },
];

// 查找表
const schoolExamRateMap = {};
examData.forEach(e => { schoolExamRateMap[e.name] = e.excellent_rate; });
const primaryToMiddleMap = {};
allSchools.forEach(s => {
  if (s.direct_middle_school && s.direct_middle_school.trim()) {
    primaryToMiddleMap[s.school_name] = s.direct_middle_school.trim();
  }
});

function matchExamRate(schoolName) {
  if (!schoolName) return null;
  if (schoolExamRateMap[schoolName] != null) return schoolExamRateMap[schoolName];
  for (const [examName, rate] of Object.entries(schoolExamRateMap)) {
    if (schoolName.includes(examName) || examName.includes(schoolName)) return rate;
  }
  return null;
}

function calculateDistrictAvgPrice(district) {
  const districtCommunities = communityPrices.filter(c => 
    c.districts && c.districts.includes(district)
  );
  if (districtCommunities.length === 0) return 0;
  const total = districtCommunities.reduce((sum, c) => sum + (c.avg_price || 0), 0);
  return Math.round(total / districtCommunities.length);
}

function getSchoolRate(schoolName) {
  let r = matchExamRate(schoolName);
  if (r == null) {
    const mid = primaryToMiddleMap[schoolName];
    if (mid) r = matchExamRate(mid);
  }
  return r;
}

function getCommunityMaxRate(community) {
  if (!community.schools || !community.schools.length) return null;
  let max = null;
  community.schools.forEach(s => {
    const r = getSchoolRate(s);
    if (r != null && (max == null || r > max)) max = r;
  });
  return max;
}

// 解析 URL 参数
function getQueryParam(name) {
  const m = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
  return m ? decodeURIComponent(m[1]) : '';
}

function init() {
  const communityName = getQueryParam('name');
  const community = communityPrices.find(c => c.name === communityName);
  const content = document.getElementById('content');

  if (!community) {
    return; // 保持空状态
  }

  const district = (community.districts || []).join('、') || '—';
  const primaryDistrict = (community.districts || [])[0] || '';
  const districtAvgPrice = primaryDistrict ? calculateDistrictAvgPrice(primaryDistrict) : 0;
  const rate = getCommunityMaxRate(community);
  const totalRange = community.min_total && community.max_total ? `${community.min_total}-${community.max_total} 万` : '—';
  const vsCity = community.avg_price - (priceStats.latest_price || 0);
  const vsCityPct = priceStats.latest_price ? (vsCity / priceStats.latest_price * 100) : 0;
  const vsDistrict = community.avg_price - districtAvgPrice;
  const vsDistrictPct = districtAvgPrice ? (vsDistrict / districtAvgPrice * 100) : 0;

  const schoolTags = (community.schools || []).map(s => {
    const r = getSchoolRate(s);
    return r != null
      ? `<span class="school-tag has-rate" title="优高率 ${r.toFixed(1)}%">${s}（优高率 ${r.toFixed(1)}%）</span>`
      : `<span class="school-tag">${s}</span>`;
  }).join('');

  content.innerHTML = `
    <div class="info-card">
      <h2>${community.name}</h2>
      <div class="info-grid">
        <div class="info-item"><div class="label">所在区域</div><div class="value">${district}</div></div>
        <div class="info-item"><div class="label">均价</div><div class="value price red">${community.avg_price.toLocaleString()} 元/㎡</div></div>
        <div class="info-item"><div class="label">总价范围</div><div class="value">${totalRange}</div></div>
        <div class="info-item"><div class="label">建成年份</div><div class="value">${community.year || '—'}</div></div>
        <div class="info-item"><div class="label">户型</div><div class="value" style="font-size:13px;">${community.layout || '—'}</div></div>
        <div class="info-item"><div class="label">最高优高率</div><div class="value ${rate != null ? 'green' : ''}">${rate != null ? rate.toFixed(1) + '%' : '—'}</div></div>
      </div>
    </div>

    <div class="price-stats">
      <div class="price-stat"><div class="label">小区均价</div><div class="value red">${community.avg_price.toLocaleString()}</div></div>
      <div class="price-stat"><div class="label">${primaryDistrict}区域均价</div><div class="value" style="color:#1e88e5;">${districtAvgPrice.toLocaleString()}</div></div>
      <div class="price-stat"><div class="label">全市最新均价</div><div class="value">${(priceStats.latest_price || 0).toLocaleString()}</div></div>
      <div class="price-stat"><div class="label">与区域差价</div><div class="value ${vsDistrict >= 0 ? 'red' : 'green'}">${vsDistrict >= 0 ? '+' : ''}${vsDistrict.toLocaleString()}</div></div>
      <div class="price-stat"><div class="label">与全市差价</div><div class="value ${vsCity >= 0 ? 'red' : 'green'}">${vsCity >= 0 ? '+' : ''}${vsCity.toLocaleString()}</div></div>
      <div class="price-stat"><div class="label">区域偏离幅度</div><div class="value ${vsDistrictPct >= 0 ? 'red' : 'green'}">${vsDistrictPct >= 0 ? '+' : ''}${vsDistrictPct.toFixed(1)}%</div></div>
    </div>

    <div class="chart-section">
      <h3><span class="icon">📈</span> 价格变化趋势</h3>
      <div id="chart-wrap"><canvas id="price-chart"></canvas></div>
      <div class="chart-legend">
        <span style="color:#0A8754;">■</span> 全市二手房月度均价走势 &nbsp;&nbsp;
        <span style="color:#1e88e5;">···</span> ${primaryDistrict}区域均价参考线（${districtAvgPrice.toLocaleString()} 元/㎡）&nbsp;&nbsp;
        <span style="color:#c62828;">—</span> ${community.name} 均价参考线（${community.avg_price.toLocaleString()} 元/㎡）
      </div>
    </div>

    <div class="chart-section">
      <h3><span class="icon">🏫</span> 对口学校</h3>
      <div class="schools-list">${schoolTags || '<span style="color:#999;">暂无对口学校数据</span>'}</div>
    </div>
  `;

  const series = priceData.map(p => ({ label: `${p.year}.${p.month}`, value: p.price }));
  drawPriceChart('price-chart', series, community.avg_price, districtAvgPrice, community.name, district);
}

function drawPriceChart(canvasId, series, refLine, districtRefLine, communityName, district) {
  const canvas = document.getElementById(canvasId);
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const cssW = wrap.clientWidth - 24;
  const cssH = 380;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = cssW, H = cssH;
  ctx.clearRect(0, 0, W, H);

  const padL = 60, padR = 30, padT = 30, padB = 50;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  const values = series.map(s => s.value);
  let minV = Math.min(...values);
  let maxV = Math.max(...values);
  if (refLine != null) {
    minV = Math.min(minV, refLine);
    maxV = Math.max(maxV, refLine);
  }
  if (districtRefLine != null && districtRefLine > 0) {
    minV = Math.min(minV, districtRefLine);
    maxV = Math.max(maxV, districtRefLine);
  }
  const span = maxV - minV || 1;
  minV -= span * 0.1; maxV += span * 0.1;

  ctx.strokeStyle = '#d0d0d0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padL, padT);
  ctx.lineTo(padL, padT + plotH);
  ctx.lineTo(padL + plotW, padT + plotH);
  ctx.stroke();

  ctx.fillStyle = '#888';
  ctx.font = '12px -apple-system, "PingFang SC"';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let i = 0; i <= 4; i++) {
    const v = minV + (maxV - minV) * (i / 4);
    const y = padT + plotH - (plotH * i / 4);
    ctx.fillText(Math.round(v).toLocaleString(), padL - 8, y);
    ctx.strokeStyle = '#eee';
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + plotW, y);
    ctx.stroke();
  }

  const n = series.length;
  const step = Math.max(1, Math.floor(n / 12));
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let i = 0; i < n; i += step) {
    const x = padL + (plotW * i / (n - 1 || 1));
    ctx.fillText(series[i].label, x, padT + plotH + 8);
  }

  if (districtRefLine != null && districtRefLine > 0) {
    const y = padT + plotH - ((districtRefLine - minV) / (maxV - minV)) * plotH;
    ctx.strokeStyle = '#1e88e5';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + plotW, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#1e88e5';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.font = '12px -apple-system, "PingFang SC"';
    ctx.fillText(districtRefLine.toLocaleString() + ' 元/㎡', padL + 6, y - 2);
  }

  if (refLine != null) {
    const y = padT + plotH - ((refLine - minV) / (maxV - minV)) * plotH;
    ctx.strokeStyle = '#c62828';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + plotW, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#c62828';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.font = '12px -apple-system, "PingFang SC"';
    ctx.fillText(refLine.toLocaleString() + ' 元/㎡', padL + 6, y - 2);
  }

  ctx.strokeStyle = '#0A8754';
  ctx.lineWidth = 2;
  ctx.beginPath();
  series.forEach((s, i) => {
    const x = padL + (plotW * i / (n - 1 || 1));
    const y = padT + plotH - ((s.value - minV) / (maxV - minV)) * plotH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  ctx.fillStyle = '#0A8754';
  series.forEach((s, i) => {
    const x = padL + (plotW * i / (n - 1 || 1));
    const y = padT + plotH - ((s.value - minV) / (maxV - minV)) * plotH;
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.fillStyle = '#333';
  ctx.font = '600 14px -apple-system, "PingFang SC"';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`全市二手房月度均价走势 vs ${communityName}（${district}）`, padL, 8);
}

init();
</script>
</body>
</html>
